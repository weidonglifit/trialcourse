<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
    #reader { width: 100%; max-width: 400px; margin: auto; background: white; padding: 10px; border-radius: 8px; }
    #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: #28a745; word-break: break-all; }
  </style>
</head>
<body>

  <h2>📷 專用相機掃描器</h2>
  <div id="reader"></div>
  <div id="result">準備就緒</div>

  <script>
    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById('result').innerHTML = "掃描成功！內容：<br>" + decodedText;
      
      // 【重頭戲】把掃描結果傳回給你的 Google 試算表網頁
      // 請把下面的網址，替換成你部署好的 Google 網頁應用程式網址
      var gasUrl = "https://script.google.com/macros/s/AKfycbxDBlXRiLMABJvYKgkDDM4sDfosgcvh18tQyIzbKM915CD1KjkImgYOA5Lvs5rPvT65/exec"; 
      
      // 這裡可以選擇自動跳轉回 GAS 網頁，或者單純顯示在螢幕上
    }

    var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
